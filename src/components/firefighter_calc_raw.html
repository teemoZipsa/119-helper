<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026년 소방공무원 초과근무 수당 계산기</title>
    
    <!-- React & ReactDOM (라이브러리 로드) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (JSX 변환용) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* 추가적인 커스텀 스타일 (필요시) */
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        /* 숫자 입력 화살표 숨기기 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <!-- React 앱이 마운트될 루트 요소 -->
    <div id="root"></div>

    <!-- 메인 스크립트 (Babel이 JSX를 변환) -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 아이콘 컴포넌트 정의 (Lucide Icons 대체) ---
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );

        const Icons = {
            Calculator: (props) => <IconBase {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconBase>,
            Coins: (props) => <IconBase {...props}><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7 .71-2.82 2.82"/></IconBase>,
            ChevronDown: (props) => <IconBase {...props}><path d="m6 9 6 6 6-6"/></IconBase>,
            ChevronUp: (props) => <IconBase {...props}><path d="m18 15-6-6-6 6"/></IconBase>,
            CalendarDays: (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></IconBase>,
            CalendarIcon: (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></IconBase>,
            RotateCcw: (props) => <IconBase {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/><path d="M3 3v9h9"/></IconBase>,
            Clock: (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconBase>,
            Flame: (props) => <IconBase {...props}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.1.2-2.2.6-3.3.3.3.5.6.8.9.3.3.6.6.9.9Z"/></IconBase>,
            CheckCircle2: (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconBase>,
            Info: (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></IconBase>,
        };

        // --- 데이터 상수 ---
        const RANK_DATA = [
            { rank: '소방령 (5급 상당)', overtime: 16960, night: 5653, holiday: 136331 },
            { rank: '소방경 (6급 상당)', overtime: 15082, night: 5027, holiday: 121237 },
            { rank: '소방위 (6급 상당)', overtime: 13779, night: 4593, holiday: 110763 },
            { rank: '소방장 (7급 상당)', overtime: 12934, night: 4311, holiday: 103969 },
            { rank: '소방교 (8급 상당)', overtime: 12584, night: 4195, holiday: 101153 },
            { rank: '소방사 (9급 상당)', overtime: 11175, night: 3725, holiday: 89830 },
            { rank: '소방사시보', overtime: 11175, night: 3725, holiday: 89830 },
        ];

        const SHIFT_TYPES = {
            FIRE: { id: 'FIRE', label: '당번', hours: 24, hasNight: true, color: 'bg-red-100 text-red-700 border-red-200' },
            DAY: { id: 'DAY', label: '주간', hours: 9, hasNight: false, color: 'bg-green-100 text-green-700 border-green-200' },
            NIGHT: { id: 'NIGHT', label: '야간', hours: 15, hasNight: true, color: 'bg-indigo-100 text-indigo-700 border-indigo-200' },
        };

        // --- 메인 컴포넌트 ---
        const App = () => {
            // --- 공통 상태 ---
            const [activeTab, setActiveTab] = useState('calendar'); 
            const [selectedRankName, setSelectedRankName] = useState('소방사 (9급 상당)');
            const [rates, setRates] = useState({
                overtime: RANK_DATA[5].overtime,
                night: RANK_DATA[5].night,
                holiday: RANK_DATA[5].holiday
            });
            const [showRateSettings, setShowRateSettings] = useState(false);
            const [includeFlatPay, setIncludeFlatPay] = useState(false);
            const [flatPayHours, setFlatPayHours] = useState(10);
            const [totalAmount, setTotalAmount] = useState(0);

            // --- 간편 입력 모드 상태 ---
            const [simpleOvertime, setSimpleOvertime] = useState('');
            const [simpleNightHours, setSimpleNightHours] = useState(''); 
            const [simpleHolidayCount, setSimpleHolidayCount] = useState('');

            // --- 달력 모드 상태 ---
            const [currentDate, setCurrentDate] = useState(new Date());
            const [shifts, setShifts] = useState({}); 
            const [holidays, setHolidays] = useState({}); 
            
            // 달력 모드 추가 입력
            const [manualWeekdays, setManualWeekdays] = useState(0); 
            const [otherOvertime, setOtherOvertime] = useState(''); 
            const [vacationDays, setVacationDays] = useState(''); 

            // 달력 모드 계산 결과
            const [calTotalWorkHours, setCalTotalWorkHours] = useState(0); 
            const [calOvertime, setCalOvertime] = useState(0); 
            const [calNightCount, setCalNightCount] = useState(0); 
            const [calHolidayCount, setCalHolidayCount] = useState(0); 
            const [calHolidayDeduction, setCalHolidayDeduction] = useState(0); 

            // --- 헬퍼 함수 ---
            const floorToTen = (num) => Math.floor(num / 10) * 10;
            const calculatePay = (qty, rate) => floorToTen(qty * rate);
            const formatCurrency = (num) => new Intl.NumberFormat('ko-KR').format(Math.floor(num));

            // --- 핸들러 ---
            const handleRankChange = (e) => {
                const rankName = e.target.value;
                setSelectedRankName(rankName);
                const rankInfo = RANK_DATA.find((r) => r.rank === rankName);
                if (rankInfo) {
                    setRates({
                        overtime: rankInfo.overtime,
                        night: rankInfo.night,
                        holiday: rankInfo.holiday
                    });
                }
            };

            const handleRateChange = (field, value) => {
                setRates(prev => ({ ...prev, [field]: Number(value) }));
            };

            // --- 달력 유틸리티 ---
            const getMonthInfo = (date) => {
                const year = date.getFullYear();
                const month = date.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDayOfMonth = new Date(year, month, 1).getDay();
                return { daysInMonth, firstDayOfMonth, year, month };
            };

            const handleCalendarReset = () => {
                setShifts({});
                setHolidays({});
                setOtherOvertime('');
                setVacationDays('');
                
                const { year, month, daysInMonth } = getMonthInfo(currentDate);
                let autoWeekdaysCount = 0;
                for (let d = 1; d <= daysInMonth; d++) {
                    const dayOfWeek = new Date(year, month, d).getDay();
                    if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                        autoWeekdaysCount++;
                    }
                }
                setManualWeekdays(autoWeekdaysCount);

                setCalTotalWorkHours(0);
                setCalOvertime(0);
                setCalNightCount(0);
                setCalHolidayCount(0);
                setCalHolidayDeduction(0);
                setTotalAmount(0);
            };

            const checkIsHoliday = (year, month, day) => {
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dateObj = new Date(year, month, day);
                const dayOfWeek = dateObj.getDay();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                return isWeekend || !!holidays[dateKey];
            };

            const handleDateClick = (day) => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                setShifts(prev => {
                    const current = prev[dateKey];
                    let next;
                    if (!current) next = 'FIRE';
                    else if (current === 'FIRE') next = 'NIGHT';
                    else if (current === 'NIGHT') next = 'DAY';
                    else next = null; 

                    if (next) return { ...prev, [dateKey]: next };
                    const { [dateKey]: deleted, ...rest } = prev;
                    return rest;
                });
            };

            const toggleHoliday = (e, day) => {
                e.stopPropagation();
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

                setHolidays(prev => {
                    if (prev[dateKey]) {
                        const { [dateKey]: deleted, ...rest } = prev;
                        return rest;
                    }
                    return { ...prev, [dateKey]: true };
                });
            };

            // --- Effects ---
            useEffect(() => {
                const { year, month, daysInMonth } = getMonthInfo(currentDate);
                let autoWeekdaysCount = 0;
                
                for (let d = 1; d <= daysInMonth; d++) {
                    if (!checkIsHoliday(year, month, d)) {
                        autoWeekdaysCount++;
                    }
                }
                setManualWeekdays(autoWeekdaysCount);
            }, [currentDate, holidays]); 

            useEffect(() => {
                let finalOvertime = 0;
                let finalNightHours = 0;
                let finalHolidayCount = 0;

                if (activeTab === 'simple') {
                    finalOvertime = Number(simpleOvertime);
                    finalNightHours = Number(simpleNightHours);
                    finalHolidayCount = Number(simpleHolidayCount);
                } else {
                    const { year, month } = getMonthInfo(currentDate);
                    
                    let totalWorkHours = 0;
                    let nightCnt = 0;
                    let holidayCnt = 0;
                    let holidayDeductionHours = 0; 

                    Object.entries(shifts).forEach(([dateKey, shiftType]) => {
                        const [sYear, sMonth, sDay] = dateKey.split('-').map(Number);
                        if (sYear === year && sMonth === (month + 1)) {
                            const typeInfo = SHIFT_TYPES[shiftType];
                            const isHoliday = checkIsHoliday(sYear, sMonth - 1, sDay);

                            totalWorkHours += typeInfo.hours;
                            
                            if (typeInfo.hasNight) nightCnt += 1;
                            
                            if (isHoliday) {
                                if (shiftType === 'FIRE' || shiftType === 'DAY') {
                                    holidayCnt += 1;
                                    holidayDeductionHours += 8;
                                }
                            }
                        }
                    });

                    const standardDeduction = manualWeekdays * 8;
                    const extra = Number(otherOvertime);
                    const vacationCredit = Number(vacationDays) * 8;
                    
                    const calcOvertime = Math.max(0, (totalWorkHours - standardDeduction - holidayDeductionHours) + extra + vacationCredit);

                    setCalTotalWorkHours(totalWorkHours);
                    setCalOvertime(calcOvertime);
                    setCalNightCount(nightCnt);
                    setCalHolidayCount(holidayCnt);
                    setCalHolidayDeduction(holidayDeductionHours);

                    finalOvertime = calcOvertime;
                    finalNightHours = nightCnt * 8;
                    finalHolidayCount = holidayCnt;
                }

                const overtimePay = calculatePay(finalOvertime, rates.overtime);
                const nightPay = calculatePay(finalNightHours, rates.night);
                const holidayPay = calculatePay(finalHolidayCount, rates.holiday);
                const flatPay = includeFlatPay ? calculatePay(flatPayHours, rates.overtime) : 0;

                setTotalAmount(overtimePay + nightPay + holidayPay + flatPay);

            }, [activeTab, simpleOvertime, simpleNightHours, simpleHolidayCount, shifts, rates, includeFlatPay, flatPayHours, currentDate, manualWeekdays, otherOvertime, vacationDays, holidays]);

            const renderCalendar = () => {
                const { daysInMonth, firstDayOfMonth, year, month } = getMonthInfo(currentDate);
                const days = [];
                
                for (let i = 0; i < firstDayOfMonth; i++) {
                    days.push(<div key={`empty-${i}`} className="h-14 sm:h-16 bg-gray-50/50"></div>);
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const shiftType = shifts[dateKey];
                    const shiftInfo = shiftType ? SHIFT_TYPES[shiftType] : null;
                    
                    const isManualHoliday = !!holidays[dateKey];
                    const dateObj = new Date(year, month, d);
                    const dayOfWeek = dateObj.getDay();
                    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                    const isHolidayDate = isWeekend || isManualHoliday;
                    
                    const dateColor = (dayOfWeek === 0 || isManualHoliday) ? 'text-red-500' : (dayOfWeek === 6 ? 'text-blue-500' : 'text-gray-700');
                    const bgColor = isHolidayDate ? 'bg-red-50/20' : 'bg-white';

                    days.push(
                        <button 
                            key={d} 
                            onClick={() => handleDateClick(d)}
                            className={`h-14 sm:h-16 border border-gray-100 flex flex-col items-center justify-start pt-1 relative transition-colors hover:bg-gray-50 group
                                ${shiftInfo ? shiftInfo.color.replace('text-', 'bg-opacity-20 ') : bgColor}
                            `}
                        >
                            <div className="w-full flex justify-between px-1">
                                <span className={`text-xs font-semibold ${dateColor}`}>{d}</span>
                                <div 
                                    onClick={(e) => toggleHoliday(e, d)}
                                    className={`text-[10px] cursor-pointer px-1 rounded border transition-colors ${isManualHoliday ? 'bg-red-500 text-white border-red-500' : 'text-gray-300 border-transparent hover:border-gray-300 hover:text-gray-400'}`}
                                >
                                휴
                                </div>
                            </div>
                            {shiftInfo && (
                                <span className={`mt-0.5 text-[10px] sm:text-xs font-bold px-1.5 py-0.5 rounded border ${shiftInfo.color}`}>
                                    {shiftInfo.label}
                                </span>
                            )}
                        </button>
                    );
                }

                return (
                    <div className="mt-4">
                        <div className="flex items-center justify-between mb-2 px-1">
                            <button onClick={() => setCurrentDate(new Date(currentDate.setMonth(currentDate.getMonth() - 1)))} className="p-1 hover:bg-gray-100 rounded text-gray-500"><Icons.ChevronDown className="rotate-90" size={20} /></button>
                            <span className="font-bold text-gray-800 text-lg">{currentDate.getFullYear()}년 {currentDate.getMonth() + 1}월</span>
                            <button onClick={() => setCurrentDate(new Date(currentDate.setMonth(currentDate.getMonth() + 1)))} className="p-1 hover:bg-gray-100 rounded text-gray-500"><Icons.ChevronDown className="-rotate-90" size={20} /></button>
                        </div>
                        <div className="grid grid-cols-7 text-center mb-1">
                            {['일', '월', '화', '수', '목', '금', '토'].map((day, i) => (
                                <div key={day} className={`text-xs font-medium py-1 ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-500'}`}>{day}</div>
                            ))}
                        </div>
                        <div className="grid grid-cols-7 rounded-lg overflow-hidden border border-gray-200">
                            {days}
                        </div>
                        <p className="text-[11px] text-gray-400 mt-2 text-center">*날짜 클릭: 근무 변경 / <span className="inline-block bg-red-500 text-white px-1 rounded text-[9px] mx-0.5">휴</span>클릭: 휴일 지정</p>
                    </div>
                );
            };

            return (
                <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                    {/* Header */}
                    <div className="bg-orange-600 p-6 text-white text-center relative">
                        <div className="absolute top-4 left-4 opacity-80"><Icons.Coins size={24} /></div>
                        <h1 className="text-2xl font-bold tracking-tight">소방공무원</h1>
                        <p className="text-orange-100 text-sm font-medium mt-1">2026년 수당 계산기</p>
                        <div className="mt-4 flex justify-center space-x-2 text-xs text-orange-200 bg-orange-700/30 py-1 px-3 rounded-full inline-block mx-auto">
                            <span>총 근무시간 공식 적용</span>
                        </div>
                    </div>

                    {/* Content */}
                    <div className="p-4 sm:p-6 space-y-6">
                    
                        {/* Section 1: Settings */}
                        <div className="space-y-3">
                            <div className="flex items-center justify-between text-gray-700 font-semibold">
                                <div className="flex items-center space-x-2"><Icons.Calculator size={18} className="text-orange-500" /><h2>계급 및 단가 설정</h2></div>
                            </div>
                            <select value={selectedRankName} onChange={handleRankChange} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 text-gray-700 font-medium text-sm">
                                {RANK_DATA.map((r) => (<option key={r.rank} value={r.rank}>{r.rank}</option>))}
                            </select>
                            <div className="bg-gray-50 rounded-xl px-3 py-2 border border-gray-200">
                                <button onClick={() => setShowRateSettings(!showRateSettings)} className="w-full flex items-center justify-between text-xs text-gray-500 font-medium hover:text-orange-600 transition-colors py-1">
                                    <span>단가 확인/수정 ({formatCurrency(rates.overtime)}원)</span>
                                    {showRateSettings ? <Icons.ChevronUp size={14} /> : <Icons.ChevronDown size={14} />}
                                </button>
                                {showRateSettings && (
                                    <div className="mt-2 grid grid-cols-1 gap-2 pb-1 border-t border-gray-200 pt-2">
                                        <div className="flex items-center justify-between"><span className="text-xs text-gray-600">시간외</span><div className="flex items-center"><input type="number" inputMode="decimal" value={rates.overtime} onChange={(e) => handleRateChange('overtime', e.target.value)} className="w-16 text-right text-xs font-bold bg-white border border-gray-300 rounded px-1 py-0.5" /><span className="text-xs ml-1 text-gray-400">원</span></div></div>
                                        <div className="flex items-center justify-between"><span className="text-xs text-indigo-600">야간</span><div className="flex items-center"><input type="number" inputMode="decimal" value={rates.night} onChange={(e) => handleRateChange('night', e.target.value)} className="w-16 text-right text-xs font-bold text-indigo-700 bg-white border border-indigo-200 rounded px-1 py-0.5" /><span className="text-xs ml-1 text-gray-400">원</span></div></div>
                                        <div className="flex items-center justify-between"><span className="text-xs text-red-600">휴일(일)</span><div className="flex items-center"><input type="number" inputMode="decimal" value={rates.holiday} onChange={(e) => handleRateChange('holiday', e.target.value)} className="w-16 text-right text-xs font-bold text-red-700 bg-white border border-red-200 rounded px-1 py-0.5" /><span className="text-xs ml-1 text-gray-400">원</span></div></div>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="h-px bg-gray-100"></div>

                        {/* Tab Navigation */}
                        <div className="bg-gray-100 p-1 rounded-xl flex font-medium text-sm">
                            <button onClick={() => setActiveTab('calendar')} className={`flex-1 py-2 rounded-lg transition-all flex items-center justify-center space-x-1 ${activeTab === 'calendar' ? 'bg-white text-orange-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icons.CalendarDays size={14} /><span>달력 (자동계산)</span></button>
                            <button onClick={() => setActiveTab('simple')} className={`flex-1 py-2 rounded-lg transition-all flex items-center justify-center space-x-1 ${activeTab === 'simple' ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icons.Calculator size={14} /><span>직접 입력</span></button>
                        </div>

                        {/* Section 2: Input Area */}
                        <div className="space-y-4">
                            {activeTab === 'calendar' && (
                                <div className="animate-in fade-in slide-in-from-bottom-2 duration-300">
                                    <div className="flex justify-between items-center mb-1">
                                        <h3 className="text-sm font-bold text-gray-700">근무 및 휴일 지정</h3>
                                        <button onClick={handleCalendarReset} className="text-xs text-gray-400 flex items-center hover:text-orange-600 ml-auto"><Icons.RotateCcw size={12} className="mr-1" /> 초기화</button>
                                    </div>
                                    {renderCalendar()}
                                    <div className="mt-4 grid grid-cols-1 gap-3 bg-gray-50 p-3 rounded-xl border border-gray-100">
                                        <div className="flex items-center justify-between">
                                            <div className="flex flex-col"><span className="text-xs font-bold text-gray-700 flex items-center"><Icons.CalendarIcon size={12} className="mr-1 text-gray-500" />평일 일수 (공제용)</span><span className="text-[10px] text-gray-400">주말·지정휴일 제외</span></div>
                                            <div className="flex items-center"><input type="number" inputMode="decimal" value={manualWeekdays} onChange={(e) => setManualWeekdays(Number(e.target.value))} className="w-16 text-center text-sm font-bold border border-gray-300 rounded px-1 py-1 focus:border-orange-500 focus:ring-1 focus:ring-orange-500" /><span className="text-xs ml-1 text-gray-500">일</span></div>
                                        </div>
                                        <div className="flex items-center justify-between">
                                            <div className="flex flex-col"><span className="text-xs font-bold text-gray-700 flex items-center"><Icons.Clock size={12} className="mr-1 text-blue-500" />기타 초과시간</span><span className="text-[10px] text-gray-400">교육, 출장 등</span></div>
                                            <div className="flex items-center"><input type="number" inputMode="decimal" placeholder="0" value={otherOvertime} onChange={(e) => setOtherOvertime(e.target.value)} className="w-16 text-center text-sm font-bold border border-gray-300 rounded px-1 py-1 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" /><span className="text-xs ml-1 text-gray-500">시간</span></div>
                                        </div>
                                        <div className="flex items-center justify-between">
                                            <div className="flex flex-col"><span className="text-xs font-bold text-gray-700 flex items-center"><Icons.Flame size={12} className="mr-1 text-red-500" />휴가 일수</span><span className="text-[10px] text-gray-400">연가, 병가 (8h 가산)</span></div>
                                            <div className="flex items-center"><input type="number" inputMode="decimal" placeholder="0" value={vacationDays} onChange={(e) => setVacationDays(e.target.value)} className="w-16 text-center text-sm font-bold border border-gray-300 rounded px-1 py-1 focus:border-red-500 focus:ring-1 focus:ring-red-500" /><span className="text-xs ml-1 text-gray-500">일</span></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'simple' && (
                                <div className="space-y-3 animate-in fade-in slide-in-from-bottom-2 duration-300">
                                    <div className="bg-blue-50 p-3 rounded-lg text-xs text-blue-700 mb-2">
                                        <p>계산된 시간을 <strong>직접 입력</strong>하여 수당을 확인합니다.</p>
                                    </div>
                                    <div className="flex justify-between items-center mb-1">
                                        <button onClick={() => { setSimpleOvertime(''); setSimpleNightHours(''); setSimpleHolidayCount(''); }} className="text-xs text-gray-400 flex items-center hover:text-orange-600 ml-auto"><Icons.RotateCcw size={12} className="mr-1" /> 초기화</button>
                                    </div>
                                    <div className="flex items-center justify-between bg-orange-50 p-3 rounded-xl border border-orange-100">
                                        <div className="flex flex-col">
                                            <span className="text-sm font-bold text-gray-700">시간외 근무</span>
                                            <span className="text-[10px] text-gray-500">인정 시간</span>
                                        </div>
                                        <div className="flex items-center w-24">
                                            <input type="number" inputMode="decimal" onFocus={(e) => e.target.select()} placeholder="0" value={simpleOvertime} onChange={(e) => setSimpleOvertime(e.target.value)} className="w-full bg-white border border-orange-200 rounded-lg p-2 text-center font-bold text-gray-800 focus:outline-none focus:ring-2 focus:ring-orange-400" />
                                            <span className="ml-2 text-sm text-gray-600">시간</span>
                                        </div>
                                    </div>
                                    <div className="flex items-center justify-between bg-indigo-50 p-3 rounded-xl border border-indigo-100">
                                        <div className="flex flex-col">
                                            <span className="text-sm font-bold text-gray-700">야간 근무</span>
                                            <span className="text-[10px] text-gray-500">22:00~06:00 근무시간</span>
                                        </div>
                                        <div className="flex items-center w-24">
                                            <input type="number" inputMode="decimal" onFocus={(e) => e.target.select()} placeholder="0" value={simpleNightHours} onChange={(e) => setSimpleNightHours(e.target.value)} className="w-full bg-white border border-indigo-200 rounded-lg p-2 text-center font-bold text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                                            <span className="ml-2 text-sm text-gray-600">시간</span>
                                        </div>
                                    </div>
                                    <div className="flex items-center justify-between bg-red-50 p-3 rounded-xl border border-red-100">
                                        <div className="flex flex-col">
                                            <span className="text-sm font-bold text-gray-700">휴일 근무</span>
                                            <span className="text-[10px] text-gray-500">당번/주간 휴일근무 일수</span>
                                        </div>
                                        <div className="flex items-center w-24">
                                            <input type="number" inputMode="decimal" onFocus={(e) => e.target.select()} placeholder="0" value={simpleHolidayCount} onChange={(e) => setSimpleHolidayCount(e.target.value)} className="w-full bg-white border border-red-200 rounded-lg p-2 text-center font-bold text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-400" />
                                            <span className="ml-2 text-sm text-gray-600">일</span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 정액분 옵션 */}
                            <div className="bg-gray-50 rounded-xl p-3 flex items-center justify-between mt-2">
                                <div className="flex items-center space-x-2">
                                    <div className={`w-5 h-5 rounded border flex items-center justify-center cursor-pointer ${includeFlatPay ? 'bg-orange-500 border-orange-500' : 'bg-white border-gray-300'}`} onClick={() => setIncludeFlatPay(!includeFlatPay)}>{includeFlatPay && <Icons.CheckCircle2 size={14} className="text-white" />}</div>
                                    <label className="text-sm text-gray-700 cursor-pointer select-none" onClick={() => setIncludeFlatPay(!includeFlatPay)}>정액분 포함 (기본 {flatPayHours}시간)</label>
                                </div>
                                {includeFlatPay && (<input type="number" value={flatPayHours} onChange={(e) => setFlatPayHours(Number(e.target.value))} className="w-12 text-center text-sm border border-gray-200 rounded p-1" />)}
                            </div>
                        </div>

                        {/* Section 3: Result */}
                        <div className="bg-gray-900 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden transition-all duration-300">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-orange-500 rounded-full mix-blend-overlay filter blur-3xl opacity-20 -mr-10 -mt-10"></div>
                            
                            <div className="relative z-10">
                                <h3 className="text-gray-400 text-sm font-medium mb-1">총 예상 수당 (세전)</h3>
                                <div className="text-4xl font-bold tracking-tight text-white flex items-end">
                                    {formatCurrency(totalAmount)}
                                    <span className="text-xl text-orange-400 mb-1 ml-1 font-medium">원</span>
                                </div>

                                <div className="mt-6 space-y-2 border-t border-gray-700 pt-4 text-sm text-gray-300">
                                    <div className="flex justify-between">
                                        <span>시간외 ({activeTab === 'simple' ? simpleOvertime || 0 : calOvertime}h)</span>
                                        <span className="font-mono">{formatCurrency(calculatePay((activeTab === 'simple' ? Number(simpleOvertime) : calOvertime), rates.overtime))} 원</span>
                                    </div>
                                    {(Number(activeTab === 'simple' ? simpleNightHours : calNightCount * 8) > 0) && (
                                        <div className="flex justify-between text-indigo-300">
                                            <span>야간 ({activeTab === 'simple' ? simpleNightHours : calNightCount * 8}h)</span>
                                            <span className="font-mono">+ {formatCurrency(calculatePay((activeTab === 'simple' ? Number(simpleNightHours) : calNightCount * 8), rates.night))} 원</span>
                                        </div>
                                    )}
                                    {(Number(activeTab === 'simple' ? simpleHolidayCount : calHolidayCount) > 0) && (
                                        <div className="flex justify-between text-red-300">
                                            <span>휴일 ({activeTab === 'simple' ? simpleHolidayCount : calHolidayCount}일)</span>
                                            <span className="font-mono">+ {formatCurrency(calculatePay((activeTab === 'simple' ? Number(simpleHolidayCount) : calHolidayCount), rates.holiday))} 원</span>
                                        </div>
                                    )}
                                    {includeFlatPay && (
                                        <div className="flex justify-between text-orange-300">
                                            <span>정액분 ({flatPayHours}h)</span>
                                            <span className="font-mono">+ {formatCurrency(calculatePay(flatPayHours, rates.overtime))} 원</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="flex items-start gap-2 bg-blue-50 p-3 rounded-lg text-xs text-blue-700">
                            <Icons.Info size={16} className="shrink-0 mt-0.5" />
                            <p>
                            {activeTab === 'calendar' 
                                ? "달력 모드: 평일 공제 및 휴일 근무 규칙(8h 공제 등)이 자동 적용됩니다."
                                : "직접 입력: 시간 × 단가 공식으로 단순 합산합니다. 야간 시간과 휴일 일수를 정확히 입력하세요."}
                            <br/>
                            * 각 항목별 금액은 10원 단위로 절사(버림)되어 합산됩니다.
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
