# ═══════════════════════════════════════════════════
# 🔧 119 Helper — Worker 자동 배포
# ═══════════════════════════════════════════════════
#
# 📋 사전 준비 (한 번만 하면 됩니다):
#
# 1. Cloudflare 계정 생성 (무료): https://dash.cloudflare.com/sign-up
#
# 2. API 토큰 만들기:
#    - https://dash.cloudflare.com/profile/api-tokens 접속
#    - "Create Token" 클릭
#    - "Edit Cloudflare Workers" 템플릿 선택
#    - "Continue to summary" → "Create Token"
#    - 생성된 토큰 복사
#
# 3. Account ID 확인:
#    - Cloudflare 대시보드 → Workers & Pages → 오른쪽의 "Account ID" 복사
#
# 4. GitHub Secrets 등록:
#    - https://github.com/119helper/119helper.github.io/settings/secrets/actions
#    - "New repository secret"으로 아래 두 개 추가:
#      CLOUDFLARE_API_TOKEN = (2번에서 복사한 토큰)
#      CLOUDFLARE_ACCOUNT_ID = (3번에서 복사한 ID)
#
# ✅ 모두 무료입니다! Workers 무료 플랜: 일 10만 건 요청.
# ═══════════════════════════════════════════════════

name: ☁️ Deploy Worker

on:
  push:
    branches: [master, main]
    paths: ['worker/**']
  workflow_dispatch: # 수동 실행 가능

jobs:
  deploy:
    name: 🚀 Deploy to Cloudflare Workers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./worker
        run: npm ci

      - name: Deploy Worker
        working-directory: ./worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
